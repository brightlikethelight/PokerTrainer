<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Professional poker training application with AI opponents and hand analysis"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>PokerTrainer - Professional Poker Training</title>
    <!-- GitHub Pages SPA redirect restoration script -->
    <script>
      (function() {
        // Restore the URL from the query parameter set by 404.html
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        } else {
          // Check for ?p= parameter from 404.html redirect
          var params = new URLSearchParams(location.search);
          var path = params.get('p');
          if (path) {
            var query = params.get('q');
            var newUrl = location.pathname.replace(/\/$/, '') + path +
              (query ? '?' + query : '') + location.hash;
            history.replaceState(null, null, newUrl);
          }
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
