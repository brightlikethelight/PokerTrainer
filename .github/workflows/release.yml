name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run full test suite
      run: |
        npm run lint
        npm run test:ci
        
    - name: Build production
      run: npm run build
      
    - name: Validate production build
      run: |
        # Check required files exist
        test -f build/index.html
        test -d build/assets

        # Check bundle size constraints (Vite outputs to build/assets/)
        TOTAL_JS_SIZE=$(find build/assets -name "*.js" -exec cat {} + | wc -c)
        if [ $TOTAL_JS_SIZE -gt 2097152 ]; then # 2MB
          echo "Total JS bundle too large: $TOTAL_JS_SIZE bytes"
          exit 1
        fi
        
    - name: Archive release build
      uses: actions/upload-artifact@v6
      with:
        name: release-build
        path: build/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-build
        path: build/
        
    - name: Create release archive
      run: |
        cd build
        tar -czf ../poker-trainer-${{ steps.get_version.outputs.VERSION }}.tar.gz .
        cd ..
        zip -r poker-trainer-${{ steps.get_version.outputs.VERSION }}.zip build/
        
    - name: Generate changelog
      id: changelog
      run: |
        # Extract changelog for this version
        VERSION=${{ steps.get_version.outputs.VERSION }}
        if [ -f CHANGELOG.md ]; then
          # Extract section for this version
          awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release-notes.md
        else
          echo "Release $VERSION" > release-notes.md
          echo "" >> release-notes.md
          echo "See commit history for changes." >> release-notes.md
        fi
        
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PRERELEASE=""
        if [[ "${{ steps.get_version.outputs.VERSION }}" =~ (alpha|beta|rc) ]]; then
          PRERELEASE="--prerelease"
        fi
        
        gh release create "${{ steps.get_version.outputs.VERSION }}" \
          --title "PokerTrainer ${{ steps.get_version.outputs.VERSION }}" \
          --notes-file release-notes.md \
          $PRERELEASE \
          "./poker-trainer-${{ steps.get_version.outputs.VERSION }}.tar.gz#Tarball" \
          "./poker-trainer-${{ steps.get_version.outputs.VERSION }}.zip#Zip Archive"

