name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:ci
        timeout-minutes: 10
        env:
          CI: true

      - name: Build application
        run: npm run build
        env:
          CI: false

      - name: Check bundle size
        run: |
          TOTAL_JS_SIZE=$(find build/assets -name "*.js" -exec cat {} + | wc -c)
          echo "Total JS bundle size: $TOTAL_JS_SIZE bytes ($(( TOTAL_JS_SIZE / 1024 )) KB)"
          if [ $TOTAL_JS_SIZE -gt 2097152 ]; then
            echo "::error::Total JS bundle exceeds 2MB limit"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false
